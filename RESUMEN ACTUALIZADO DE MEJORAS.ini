RESUMEN ACTUALIZADO DE MEJORAS
1️⃣ NAVEGACIÓN MÓVIL - APP DE RECOGIDA DE PRECIOS
Campo MATRÍCULA:
Al presionar "Enter/Intro" → Focus automático a KM
Campo KM:
Al presionar "Ir/Enter" → Ocultar teclado + listo para seleccionar Particular/Empresa
Botones PARTICULAR/EMPRESA:
Al hacer clic → Focus a "Fecha de Primera Matriculación" con teclado abierto
Al presionar "Ir/Enter" en fecha → Ocultar teclado + Scroll al final para ver botón "Continuar"
2️⃣ PÁGINA "DAÑOS ESTÉTICOS EXTERIORES"
Auto-scroll a los 3 segundos:
Al entrar en la página, esperar 3 segundos y hacer scroll hacia abajo
Objetivo: Que queden visibles:
✅ Botones de navegación de vistas (Frontal, Lateral Izquierda, Trasera, Lateral Derecha...)
✅ Botones de "Siguiente vista" y "Atrás"
3️⃣ PÁGINA "DAÑOS ESTÉTICOS INTERIORES"
Botones de vistas en UNA SOLA FILA:
Como son 4 botones (igual que en exteriores), deben estar en 1 fila (no 2 filas)
Auto-scroll a los 3 segundos:
Igual que en exteriores: esperar 3 segundos y hacer scroll hacia abajo
Objetivo: Que queden visibles:
✅ Botones de navegación de vistas (las 4 vistas interiores en 1 fila)
✅ Botones de "Siguiente vista" y "Atrás"
4️⃣ OCULTAR BARRA DE NAVEGACIÓN
En TODAS las páginas de la app de tasación:
Ocultar la barra de navegación desde la primera página hasta el final del flujo
Más espacio disponible en pantalla para el contenido
5️⃣ PÁGINA "DATOS DEL VEHÍCULO"
Botones ITV EN VIGOR (Sí/No):
Al hacer clic en "Sí" o "No" → Focus automático al campo "Fecha de ITV" con teclado abierto
Campo "Fecha de ITV":
Al presionar "Intro/Ir" → Focus a "Observaciones" (ya funciona bien)
AÑADIR: Scroll automático hacia abajo para que el usuario vea:
✅ Arriba: cuadro de escritura de Observaciones
✅ Botones de navegación visibles
✅ Debajo: teclado
6️⃣ PÁGINA "FOTOGRAFÍAS"
Auto-scroll a los 3 segundos:
Al entrar en la página, esperar 3 segundos y hacer scroll hacia abajo
Para mejorar visibilidad de los controles y botones
7️⃣ CONTROL DE ORIENTACIÓN DEL MÓVIL
Detección y control automático de orientación:
Páginas normales del formulario: Forzar orientación VERTICAL
Al abrir cámara: Forzar orientación HORIZONTAL (ya funciona)
Al cerrar cámara y volver a página normal: Forzar orientación VERTICAL de nuevo